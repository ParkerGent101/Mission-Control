<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=UnifrakturCook:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#d8a93b;--gold-bright:#f2cb63;--bone:#e8e2d0;--blood:#b3242a;--dim:#5a5340}
body{background:#0a0b0e;color:var(--bone);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
/* CRT scanlines + grimdark vignette */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.16) 2px,rgba(0,0,0,.16) 3px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:8;background:radial-gradient(60% 42% at 50% -6%,rgba(216,169,59,.10),transparent 70%),radial-gradient(130% 120% at 50% 45%,transparent 48%,rgba(0,0,0,.72) 100%)}
.card{width:min(390px,92vw);background:linear-gradient(180deg,#0d0f13,#0a0b0e);border:1px solid rgba(216,169,59,.32);border-radius:3px;padding:46px 38px 38px;position:relative;box-shadow:0 18px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(242,203,99,.12);z-index:1}
/* bright gold top rail */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 22%,var(--gold-bright) 50%,var(--gold) 78%,transparent);box-shadow:0 0 9px rgba(216,169,59,.55)}
/* inner gilded frame */
.card::after{content:'';position:absolute;inset:5px;border:1px solid rgba(216,169,59,.18);border-radius:2px;pointer-events:none}
.sigil{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--gold);text-align:center;margin-bottom:6px;text-shadow:0 0 14px rgba(216,169,59,.5)}
.logo{font-family:'UnifrakturCook',serif;font-size:30px;letter-spacing:1px;color:var(--gold);text-align:center;line-height:1;margin-bottom:8px;text-shadow:0 0 14px rgba(216,169,59,.55),0 0 30px rgba(216,169,59,.2)}
.sub{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:34px}
.prompt-line{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:8px}
input[type=password]{width:100%;background:#06070a;border:1px solid rgba(216,169,59,.28);border-radius:2px;padding:12px 14px;color:var(--gold-bright);font-family:'Share Tech Mono',monospace;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:3px}
input[type=password]:focus{border-color:var(--gold);box-shadow:0 0 10px rgba(216,169,59,.35),inset 0 1px 3px rgba(0,0,0,.5)}
.btn{width:100%;margin-top:16px;padding:13px;background:linear-gradient(180deg,rgba(216,169,59,.16),rgba(216,169,59,.06));color:var(--gold-bright);font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:700;letter-spacing:3px;border:1px solid var(--gold);border-radius:2px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:linear-gradient(180deg,rgba(216,169,59,.32),rgba(216,169,59,.14));box-shadow:0 0 12px rgba(216,169,59,.4)}
.err{margin-top:14px;font-size:11px;color:var(--blood);text-align:center;display:none;letter-spacing:2px;text-shadow:0 0 8px rgba(179,36,42,.5)}
.creed{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);z-index:1;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="sigil">&#10016;</div>
  <div class="logo">Mission Control</div>
  <div class="sub">&#10016; Authorization Required &#10016;</div>
  <label class="prompt-line">Access Rites</label>
  <input type="text" name="username" autocomplete="username" value="parker" style="display:none">
  <input type="password" id="pw" name="password" autocomplete="current-password" placeholder="&bull; &bull; &bull; &bull; &bull; &bull; &bull; &bull;" autofocus onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Authenticate</button>
  <div class="err" id="err">&#9888; ACCESS DENIED</div>
</div>
<div class="creed">&#10016; The Emperor Protects &#10016;</div>
<script>
async function login() {
  const pw=document.getElementById('pw').value;
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(res.ok){window.location.href='/';}
  else{document.getElementById('err').style.display='block';}
}
</script>
</body>
</html>
