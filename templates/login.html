<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;color:#C8C8C8;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);z-index:9999}
.card{width:min(380px,92vw);background:#0a0a0a;border:1px solid rgba(0,255,65,.2);border-radius:2px;padding:44px 36px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,65,.6),transparent)}
.logo{font-family:'Orbitron',sans-serif;font-size:16px;letter-spacing:6px;color:#00FF41;text-align:center;margin-bottom:4px;text-transform:uppercase;text-shadow:0 0 8px rgba(0,255,65,.6),0 0 20px rgba(0,255,65,.2)}
.sub{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#3d3d3d;text-align:center;margin-bottom:36px}
.prompt-line{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#3d3d3d;display:block;margin-bottom:8px}
input[type=password]{width:100%;background:#141414;border:1px solid rgba(0,255,65,.2);border-radius:2px;padding:12px 14px;color:#00FF41;font-family:'Share Tech Mono',monospace;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:2px}
input[type=password]:focus{border-color:#00FF41;box-shadow:0 0 8px rgba(0,255,65,.3)}
.btn{width:100%;margin-top:14px;padding:13px;background:transparent;color:#00FF41;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;border:1px solid #00FF41;border-radius:2px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:rgba(0,255,65,.1);box-shadow:0 0 8px rgba(0,255,65,.3)}
.err{margin-top:14px;font-size:11px;color:#FF2525;text-align:center;display:none;letter-spacing:2px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Mission Control</div>
  <div class="sub">Authorization Required</div>
  <label class="prompt-line">Access Code</label>
  <input type="text" name="username" autocomplete="username" value="parker" style="display:none">
  <input type="password" id="pw" name="password" autocomplete="current-password" placeholder="_ _ _ _ _ _ _ _" autofocus onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Authenticate</button>
  <div class="err" id="err">⚠ ACCESS DENIED</div>
</div>
<script>
async function login() {
  const pw=document.getElementById('pw').value;
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(res.ok){window.location.href='/';}
  else{document.getElementById('err').style.display='block';}
}
</script>
</body>
</html>
